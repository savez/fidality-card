<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">Fidelity Card</title>
  <desc id="banner-desc">PWA Vue 3 open-source per gestire le proprie fidelity card senza backend custom</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="55%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>

    <linearGradient id="card-white" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>

    <linearGradient id="card-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>

    <linearGradient id="card-coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>

    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <pattern id="dot-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="white" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#dot-grid)"/>

  <!-- Soft glow blobs -->
  <circle cx="180" cy="60" r="180" fill="white" fill-opacity="0.05"/>
  <circle cx="1100" cy="320" r="200" fill="white" fill-opacity="0.04"/>

  <!-- Cards stack (right side) -->
  <g transform="translate(820, 60)" filter="url(#card-shadow)">

    <!-- Card 3 (back, coral) -->
    <g transform="rotate(-16, 150, 110) translate(80, 35)">
      <rect width="280" height="170" rx="16" fill="url(#card-coral)"/>
      <text x="22" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="2">ESSELUNGA</text>
      <text x="22" y="62" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="400" fill="white" fill-opacity="0.85">Fìdaty</text>
      <!-- mini barcode -->
      <g transform="translate(22, 120)" fill="white">
        <rect x="0" y="0" width="2" height="32"/>
        <rect x="4" y="0" width="1" height="32"/>
        <rect x="7" y="0" width="3" height="32"/>
        <rect x="12" y="0" width="2" height="32"/>
        <rect x="16" y="0" width="1" height="32"/>
        <rect x="19" y="0" width="2" height="32"/>
        <rect x="23" y="0" width="3" height="32"/>
        <rect x="28" y="0" width="2" height="32"/>
        <rect x="32" y="0" width="1" height="32"/>
        <rect x="35" y="0" width="2" height="32"/>
        <rect x="39" y="0" width="3" height="32"/>
        <rect x="44" y="0" width="2" height="32"/>
        <rect x="48" y="0" width="1" height="32"/>
        <rect x="51" y="0" width="2" height="32"/>
        <rect x="55" y="0" width="3" height="32"/>
        <rect x="60" y="0" width="1" height="32"/>
        <rect x="63" y="0" width="2" height="32"/>
        <rect x="67" y="0" width="3" height="32"/>
        <rect x="72" y="0" width="2" height="32"/>
        <rect x="76" y="0" width="1" height="32"/>
      </g>
    </g>

    <!-- Card 2 (middle, amber) -->
    <g transform="rotate(-6, 150, 100) translate(40, 18)">
      <rect width="280" height="170" rx="16" fill="url(#card-amber)"/>
      <text x="22" y="40" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#3E2723" letter-spacing="2">CONAD CARD</text>
      <text x="22" y="62" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="400" fill="#3E2723" fill-opacity="0.7">Insieme</text>
      <!-- chip -->
      <rect x="22" y="80" width="32" height="22" rx="4" fill="#3E2723" fill-opacity="0.3"/>
      <text x="225" y="158" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#3E2723" fill-opacity="0.7" text-anchor="end">1234 5678 9012</text>
    </g>

    <!-- Card 1 (front, white with QR) -->
    <g transform="rotate(6, 150, 90)">
      <rect width="280" height="170" rx="16" fill="url(#card-white)"/>
      <text x="22" y="38" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#1976D2" letter-spacing="1.5">FIDELITY</text>
      <text x="22" y="58" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="400" fill="#546E7A">Your card, on your device</text>

      <!-- QR code (stylized) -->
      <g transform="translate(180, 25)" fill="#1A1A1A">
        <!-- corner finders -->
        <rect x="0" y="0" width="22" height="22"/>
        <rect x="3" y="3" width="16" height="16" fill="white"/>
        <rect x="6" y="6" width="10" height="10"/>
        <rect x="58" y="0" width="22" height="22"/>
        <rect x="61" y="3" width="16" height="16" fill="white"/>
        <rect x="64" y="6" width="10" height="10"/>
        <rect x="0" y="58" width="22" height="22"/>
        <rect x="3" y="61" width="16" height="16" fill="white"/>
        <rect x="6" y="64" width="10" height="10"/>
        <!-- data modules -->
        <rect x="28" y="2" width="4" height="4"/>
        <rect x="36" y="2" width="4" height="4"/>
        <rect x="44" y="2" width="4" height="4"/>
        <rect x="52" y="2" width="4" height="4"/>
        <rect x="28" y="10" width="4" height="4"/>
        <rect x="40" y="10" width="4" height="4"/>
        <rect x="48" y="10" width="4" height="4"/>
        <rect x="28" y="18" width="4" height="4"/>
        <rect x="36" y="18" width="4" height="4"/>
        <rect x="52" y="18" width="4" height="4"/>
        <rect x="2" y="28" width="4" height="4"/>
        <rect x="14" y="28" width="4" height="4"/>
        <rect x="22" y="28" width="4" height="4"/>
        <rect x="30" y="28" width="4" height="4"/>
        <rect x="38" y="28" width="4" height="4"/>
        <rect x="46" y="28" width="4" height="4"/>
        <rect x="58" y="28" width="4" height="4"/>
        <rect x="66" y="28" width="4" height="4"/>
        <rect x="74" y="28" width="4" height="4"/>
        <rect x="6" y="36" width="4" height="4"/>
        <rect x="18" y="36" width="4" height="4"/>
        <rect x="32" y="36" width="4" height="4"/>
        <rect x="42" y="36" width="4" height="4"/>
        <rect x="56" y="36" width="4" height="4"/>
        <rect x="68" y="36" width="4" height="4"/>
        <rect x="2" y="44" width="4" height="4"/>
        <rect x="10" y="44" width="4" height="4"/>
        <rect x="26" y="44" width="4" height="4"/>
        <rect x="38" y="44" width="4" height="4"/>
        <rect x="50" y="44" width="4" height="4"/>
        <rect x="62" y="44" width="4" height="4"/>
        <rect x="74" y="44" width="4" height="4"/>
        <rect x="28" y="52" width="4" height="4"/>
        <rect x="40" y="52" width="4" height="4"/>
        <rect x="48" y="52" width="4" height="4"/>
        <rect x="58" y="52" width="4" height="4"/>
        <rect x="70" y="52" width="4" height="4"/>
        <rect x="30" y="60" width="4" height="4"/>
        <rect x="38" y="60" width="4" height="4"/>
        <rect x="50" y="60" width="4" height="4"/>
        <rect x="62" y="60" width="4" height="4"/>
        <rect x="74" y="60" width="4" height="4"/>
        <rect x="28" y="68" width="4" height="4"/>
        <rect x="36" y="68" width="4" height="4"/>
        <rect x="44" y="68" width="4" height="4"/>
        <rect x="56" y="68" width="4" height="4"/>
        <rect x="68" y="68" width="4" height="4"/>
        <rect x="76" y="68" width="4" height="4"/>
      </g>

      <!-- barcode bottom -->
      <g transform="translate(22, 110)" fill="#1A1A1A">
        <rect x="0" y="0" width="2" height="32"/>
        <rect x="4" y="0" width="1" height="32"/>
        <rect x="7" y="0" width="3" height="32"/>
        <rect x="12" y="0" width="2" height="32"/>
        <rect x="16" y="0" width="1" height="32"/>
        <rect x="19" y="0" width="2" height="32"/>
        <rect x="23" y="0" width="3" height="32"/>
        <rect x="28" y="0" width="2" height="32"/>
        <rect x="32" y="0" width="1" height="32"/>
        <rect x="35" y="0" width="2" height="32"/>
        <rect x="39" y="0" width="3" height="32"/>
        <rect x="44" y="0" width="2" height="32"/>
        <rect x="48" y="0" width="1" height="32"/>
        <rect x="51" y="0" width="2" height="32"/>
        <rect x="55" y="0" width="3" height="32"/>
        <rect x="60" y="0" width="1" height="32"/>
        <rect x="63" y="0" width="2" height="32"/>
        <rect x="67" y="0" width="3" height="32"/>
        <rect x="72" y="0" width="2" height="32"/>
        <rect x="76" y="0" width="1" height="32"/>
        <rect x="80" y="0" width="3" height="32"/>
        <rect x="85" y="0" width="2" height="32"/>
        <rect x="89" y="0" width="1" height="32"/>
        <rect x="92" y="0" width="3" height="32"/>
        <rect x="97" y="0" width="2" height="32"/>
        <rect x="101" y="0" width="1" height="32"/>
        <rect x="104" y="0" width="2" height="32"/>
        <rect x="108" y="0" width="3" height="32"/>
        <rect x="113" y="0" width="2" height="32"/>
        <rect x="117" y="0" width="1" height="32"/>
        <rect x="120" y="0" width="2" height="32"/>
        <rect x="124" y="0" width="3" height="32"/>
        <rect x="129" y="0" width="2" height="32"/>
        <rect x="133" y="0" width="1" height="32"/>
        <rect x="136" y="0" width="3" height="32"/>
        <rect x="141" y="0" width="2" height="32"/>
      </g>
      <text x="22" y="156" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#546E7A">8 001120 000019</text>
    </g>
  </g>

  <!-- Left text -->
  <g fill="white">
    <text x="80" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="800" letter-spacing="-1.5">Fidelity Card</text>
    <text x="80" y="180" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400" fill-opacity="0.92">PWA Vue 3 per le tue tessere fedeltà</text>
    <text x="80" y="208" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400" fill-opacity="0.92">Open source · zero account · zero server</text>

    <!-- Chip badges -->
    <g transform="translate(80, 248)" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600">
      <g>
        <rect x="0" y="0" width="86" height="30" rx="15" fill="white" fill-opacity="0.16" stroke="white" stroke-opacity="0.4"/>
        <text x="43" y="20" text-anchor="middle" fill="white">📱 PWA</text>
      </g>
      <g transform="translate(96, 0)">
        <rect width="118" height="30" rx="15" fill="white" fill-opacity="0.16" stroke="white" stroke-opacity="0.4"/>
        <text x="59" y="20" text-anchor="middle" fill="white">📷 Scan camera</text>
      </g>
      <g transform="translate(224, 0)">
        <rect width="118" height="30" rx="15" fill="white" fill-opacity="0.16" stroke="white" stroke-opacity="0.4"/>
        <text x="59" y="20" text-anchor="middle" fill="white">🔗 Share QR/link</text>
      </g>
      <g transform="translate(352, 0)">
        <rect width="110" height="30" rx="15" fill="white" fill-opacity="0.16" stroke="white" stroke-opacity="0.4"/>
        <text x="55" y="20" text-anchor="middle" fill="white">🔒 100% local</text>
      </g>
    </g>
  </g>
</svg>
