name: Deploy GitHub Pages

on:
  push:
    branches: [landing]
  schedule:
    # Una volta al giorno alle 04:00 UTC: rebuild per riflettere
    # eventuali version bump avvenuti su `main` (release-please).
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Serve per accedere a `origin/main` e leggerne la versione.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Read app version from main
        id: appver
        run: |
          git fetch origin main --depth=1
          VERSION=$(git show origin/main:package.json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).version))")
          if [ -z "$VERSION" ]; then
            echo "ERROR: could not resolve app version from origin/main:package.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version from main: $VERSION"

      - name: Install landing deps
        run: npm ci
        working-directory: landing

      - name: Build landing
        run: npm run build
        working-directory: landing
        env:
          PUBLIC_APP_VERSION: ${{ steps.appver.outputs.version }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: landing/dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore(landing): deploy ${{ github.sha }}'
