name: Release

on:
  push:
    tags:
      # Versioning standard: tag con prefisso `v` (es. v1.2.3) — raccomandato
      - 'v[0-9]+.[0-9]+.[0-9]+'
      # Compatibilità con tag senza prefisso (es. 1.0.0) — vecchio formato
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create or skip release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
